{% extends 'layout.html' %}
{% block content %}

<h1>Contact</h1>
<p>Have a project in mind or want to connect? Drop a message below.</p>

<div class="contact-info">
    <div class="contact-chip">
        <span class="contact-chip-label">Email</span>
        <span class="contact-chip-value">passaweekaewduk@gmail.com</span>
    </div>
    <div class="contact-chip">
        <span class="contact-chip-label">Tel</span>
        <span class="contact-chip-value">083-8405279</span>
    </div>
</div>

<h2>Send a Message</h2>
<form method="POST" action="/contact">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
    </div>
    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your message..." required></textarea>
    </div>
    <button type="submit"><span>Send Message</span></button>
</form>

{% endblock %}
